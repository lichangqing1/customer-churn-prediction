services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: churn
      POSTGRES_USER: churn
      POSTGRES_PASSWORD: churn_local_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U churn -d churn"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pipeline:
    build: .
    command: python scripts/load_postgres_warehouse.py
    environment:
      DATABASE_URL: postgresql+psycopg://churn:churn_local_dev@postgres:5432/churn
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.address=0.0.0.0 --server.port=8501
    environment:
      DATABASE_URL: postgresql+psycopg://churn:churn_local_dev@postgres:5432/churn
    depends_on:
      pipeline:
        condition: service_completed_successfully
    ports:
      - "8501:8501"

volumes:
  postgres_data:
